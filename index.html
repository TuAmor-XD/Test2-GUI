<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MovieScope</title>
  <link rel="stylesheet" href="styles.css">
  <script src="app.js" defer></script>
</head>
<body>

<div class="app">

  <header>
    <div class="logo">MOVIE<span style="color:var(--accent)">SCOPE</span></div>

    <div id="search-wrap" data-loading="false">
      <input id="search-input" type="text" placeholder="Find a movie..." autocomplete="off">
      <div class="spinner"></div>
    </div>

    <div id="status-bar">READY</div>
  </header>

  <aside>
    <div id="results-header">0 RESULTS</div>

    <template id="result-template">
      <li class="result-item">

        <div class="result-poster-placeholder"></div>

        <div class="result-info">
          <div class="result-title"></div>
          <div class="result-meta"></div>
        </div>

        <div class="result-rating"></div>
      </li>
    </template>

    <ul id="result-list"></ul>
  </aside>

  <main>

    <div id="detail-empty">
      <div style="font-size:40px; margin-bottom:10px;">🎬</div>
      <p>Select a movie to view details</p>
    </div>

    <div id="detail-content">

      <div id="detail-poster-wrap"></div>

      <h2 id="detail-title"></h2>
      <p id="detail-overview"></p>

      <div id="detail-cast"></div>

      <div id="detail-trailer"></div>

    </div>

  </main>

</div>

</body>
</html>
